services:
  mysql:
    image: mysql:8.0
    container_name: school-wall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: school_wall
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p12345678"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    platform: ${TARGET_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: school-wall-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: 12345678
      DB_DATABASE: school_wall
      JWT_SECRET: school_wall-server-secret
      JWT_EXPIRES_IN: 7d
    ports:
      - "3000:3000"

  frontend:
    platform: ${TARGET_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_APP_API_BASE_URL: ${VITE_APP_API_BASE_URL:-http://localhost:3000}
    container_name: school-wall-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  mysql_data:
